baseURL = 'https://vidi.damie.eu'
languageCode = 'en-us'
title = "Vidi - internet's living room"
theme = ["reveal-hugo"]

[params]
author = "Marc Damie"

[markup.goldmark.renderer]
unsafe = true

[outputFormats.Reveal]
baseName = "index"
mediaType = "text/html"
isHTML = true


[caches]
  [caches.images]
    dir = ':cacheDir/images'


[params.reveal_hugo]
custom_theme = "custom-theme.scss"
custom_theme_compile = true
view = "scroll"
scroll_progress = true
margin = 0.05
