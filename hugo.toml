baseURL = 'https://vidi.marct0k.github.io/'
languageCode = 'en-us'
title = "Vidi - internet's living room"
theme = ["reveal-hugo"]

[author]
name = "Marc Damie"

[markup.goldmark.renderer]
unsafe = true

[outputFormats.Reveal]
baseName = "index"
mediaType = "text/html"
isHTML = true

[params.reveal_hugo]
custom_theme = "custom-theme.scss"
custom_theme_compile = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
